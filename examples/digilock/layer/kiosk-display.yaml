# METABEGIN
# X-Env-Layer-Name: kiosk-display
# X-Env-Layer-Category: example
# X-Env-Layer-Desc: Minimal kiosk display layer that opens local app URL on boot.
# X-Env-Layer-Requires: rpi-user-credentials,systemd-timesyncd
# METAEND
---
mmdebstrap:
  packages:
    - cage
    - chromium
    - curl
  customize-hooks:
    - |
      set -eu
      export KIOSK_USER="$IGconf_device_user1"
      export KIOSK_RUNDIR="/home/$KIOSK_USER"
      export KIOSK_APP="/usr/bin/chromium http://127.0.0.1:8080 --kiosk --noerrdialogs --disable-infobars --no-first-run --enable-features=OverlayScrollbar --start-maximized"

      cat > "$1/usr/local/bin/kiosk-display-launcher" <<'EOF'
      #!/bin/sh
      set -eu
      url="http://127.0.0.1:8080"
      while ! /usr/bin/curl -fsS "$url" >/dev/null 2>&1; do
        sleep 2
      done
      exec /usr/bin/cage -- /usr/bin/chromium "$url" --kiosk --noerrdialogs --disable-infobars --no-first-run --enable-features=OverlayScrollbar --start-maximized
      EOF
      chmod 0755 "$1/usr/local/bin/kiosk-display-launcher"
      envsubst < "$SRCROOT/kiosk.service.tpl" > "$1/etc/systemd/system/kiosk-display.service"
      $BDEBSTRAP_HOOKS/enable-units "$1" kiosk-display
      $BDEBSTRAP_HOOKS/disable-units "$1" getty@tty1 systemd-networkd-wait-online
      export IFACE=eth0
      export BASE=digilock-kiosk
      envsubst < "$SRCROOT/set-hostname-mac.service.tpl" > "$1/etc/systemd/system/set-hostname-mac.service"
      ln -sf ../system/set-hostname-mac.service "$1/etc/systemd/system/multi-user.target.wants/set-hostname-mac.service"
